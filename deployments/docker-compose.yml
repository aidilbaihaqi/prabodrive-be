version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: build/docker/Dockerfile
    container_name: myapp-api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=myapp_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_ACCESS_SECRET=your-access-secret-change-in-production
      - JWT_REFRESH_SECRET=your-refresh-secret-change-in-production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myapp-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: myapp-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=myapp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: myapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myapp-network
    restart: unless-stopped

  # Optional: Adminer for database management
  adminer:
    image: adminer
    container_name: myapp-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - myapp-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  myapp-network:
    driver: bridge
